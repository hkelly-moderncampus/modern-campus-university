<script>
  async function loadSpanishProgram() {
    const response = await fetch(
      "https://hkelly-moderncampus.netlify.app/.netlify/functions/spanish-program"
    );

    const data = await response.json();

    document.getElementById("degree-content").innerHTML =
      formatProgramXml(data.degree, "degree");

    document.getElementById("admissions-content").innerHTML =
      formatProgramXml(data.admissions, "admissions");
  }

  function formatProgramXml(xmlString, type) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlString, "text/xml");

    const title = xml.querySelector("title")?.textContent || "";
    const content = xml.querySelector("content")?.textContent || "";

    const cores = Array.from(xml.querySelectorAll("core"));

    let html = "";

    if (content.trim()) {
      html += `<div class="program-copy">${content}</div>`;
    }

    cores.forEach(core => {
      const coreTitle = core.querySelector("title")?.textContent || "";
      const coreContent = core.querySelector("content")?.textContent || "";

      html += `
        <div class="requirement-card">
          <h4>${coreTitle}</h4>
          <div>${coreContent || "<p>No additional content listed.</p>"}</div>
        </div>
      `;
    });

    if (!html) {
      html = "<p>No requirements are currently listed.</p>";
    }

    return html;
  }

  function showProgramTab(tab) {
    document.getElementById("degree").style.display = "none";
    document.getElementById("admissions").style.display = "none";
    document.getElementById(tab).style.display = "block";
  }

  loadSpanishProgram();
</script>
