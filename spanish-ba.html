<script>
function showProgramTab(tab) {
  document.getElementById("degree").style.display = "none";
  document.getElementById("admissions").style.display = "none";

  document.getElementById("degree-tab").classList.remove("active-tab");
  document.getElementById("admissions-tab").classList.remove("active-tab");

  document.getElementById(tab).style.display = "block";
  document.getElementById(tab + "-tab").classList.add("active-tab");
}

function formatProgramXml(xmlString) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlString, "text/xml");

  const cores = Array.from(xml.getElementsByTagName("core"));

  if (!cores.length) {
    return "<p>No requirements are currently listed.</p>";
  }

  let html = "";

  cores.forEach((core) => {
    const title =
      core.getElementsByTagName("a:title")[0]?.textContent || "";

    const content =
      core.getElementsByTagName("a:content")[0]?.textContent || "";

    html += `
      <div class="requirement-card">
        <h4>${title}</h4>
        <p>${content || "No additional content listed."}</p>
      </div>
    `;
  });

  return html;
}

async function loadSpanishProgram() {
  try {
    const response = await fetch(
      "https://hkelly-moderncampus.netlify.app/.netlify/functions/spanish-program"
    );

    const data = await response.json();

    document.getElementById("degree-content").innerHTML =
      formatProgramXml(data.degree);

    document.getElementById("admissions-content").innerHTML =
      formatProgramXml(data.admissions);

  } catch (error) {
    document.getElementById("degree-content").innerHTML =
      "<p>Unable to load degree requirements.</p>";

    document.getElementById("admissions-content").innerHTML =
      "<p>Unable to load admissions requirements.</p>";
  }
}

loadSpanishProgram();
</script>
